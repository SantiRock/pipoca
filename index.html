<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000">
    <link rel="icon" type="image/png" href="./images/favicon.png" />
    <meta property="og:image" content="https://i.imgur.com/SGP6rHF.jpeg"/>
    <meta property="og:title" content="Pipoca Music" />
    <meta property="og:url" content="https://pipoca.vercel.app/" />
    <meta property="og:description" content="Fresh Tunes" />
    <meta property="og:site_name" content="Picopca Music" />
    <meta property="og:type" content="website" />
    <meta name="description" content="Fresh Tunes">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Santiago Quintero"/>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/1.0.0/modern-normalize.min.css"
    />
    <title>Pipoca</title>
</head>
<body>
    <div class="main_container">
        <header>
            <nav>
                <a class="sm" href="https://pipocamusic.bandcamp.com/" target="_blank" >
                    <svg class="icon">
                        <use href="./images/symbol-defs.svg#bandcamp1"></use>
                    </svg>
                </a>
                <a class="sm" href="https://pipocamusic.bandcamp.com/" target="_blank" >
                    <svg class="icon">
                        <use href="./images/symbol-defs.svg#tidal"></use>
                    </svg>
                </a>
                <a class="sm" href="https://www.youtube.com/@pipocatunes" target="_blank" >
                    <svg class="icon">
                        <use href="./images/symbol-defs.svg#youtube"></use>
                    </svg>
                </a>
                <a class="sm" href="https://soundcloud.com/pipocamusic" target="_blank" >
                    <svg class="icon">
                        <use href="./images/symbol-defs.svg#spotify"></use>
                    </svg>
                </a>
                <a class="sm" href="https://www.instagram.com/pipocatunes/" target="_blank" >
                    <svg class="icon">
                        <use href="./images/symbol-defs.svg#instagram"></use>
                    </svg>
                </a>


                <select class="lang" id="lang">
                  <option value="es">Español</option>
                  <option value="pt">Português</option>
                  <option value="fr">Français</option>
                  <option value="de">Deutsch</option>
                  <option value="en">English</option>
                </select>
            </nav>
            <div class="logo">
                <img src="images/rayito_alpha.png" alt="Pipoca" with="80" height="80" />
            </div>   
        </header>

        <main>
            <div class="statment" id="statment">
            </div>
        </main>

        <script src="./main.js" type="module" ></script>

    </div>
    
</body>
</html>
